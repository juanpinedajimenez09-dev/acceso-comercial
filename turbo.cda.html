<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURBO – Asistente Virtual CDA Barroblanco</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5c888;
    --surface: #f0ba70;
    --surface2: #e8a858;
    --border: rgba(140,70,0,0.18);
    --accent: #1a5fa8;
    --accent2: #0d3f7a;
    --success: #006a42;
    --warning: #c07000;
    --text: #1a0a00;
    --muted: #5a3000;
    --bot-bubble: #f0ba70;
    --user-bubble: linear-gradient(135deg,#0d3f7a,#1a5fa8);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background: linear-gradient(135deg, #f0b060 0%, #f5c888 40%, #90b8e0 70%, #5a90c8 100%);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden;}
  
  /* HEADER */
  .header{width:100%;background:linear-gradient(135deg,#f0a040 0%,#2a7fd4 100%);border-bottom:1px solid rgba(140,70,0,0.2);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .logo-circle{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 0 18px rgba(0,136,255,0.4);}
  .header-info{flex:1}
  .header-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#1a0a00;line-height:1}
  .header-sub{font-size:11px;color:#3a1500;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
  .status-pill{display:flex;align-items:center;gap:6px;background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--success);font-weight:600;letter-spacing:.5px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,160,.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(0,229,160,0)}}

  /* FEATURES BAR */
  .features{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(140,70,0,0.18);width:100%;max-width:860px;}
  .features::-webkit-scrollbar{display:none}
  .feat{display:flex;align-items:center;gap:6px;background:#e8a858;border:1px solid rgba(140,70,0,0.2);border-radius:20px;padding:5px 12px;font-size:11px;color:#2a1000;white-space:nowrap;font-weight:500;}
  .feat svg{width:13px;height:13px;flex-shrink:0;color:#3a1800;}

  /* CHAT CONTAINER */
  .chat-wrap{flex:1;width:100%;max-width:860px;display:flex;flex-direction:column;height:calc(100vh - 130px);}
  .messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

  /* BUBBLES */
  .msg{display:flex;gap:10px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.user{flex-direction:row-reverse}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:600;}
  .avatar.user-av{background:linear-gradient(135deg,#2a3a5e,#3a4a6e);font-size:13px;}
  .bubble{max-width:72%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;}
  .msg.bot .bubble{background:#f0ba70;border:1px solid rgba(140,70,0,0.2);border-top-left-radius:4px;}
  .msg.user .bubble{background:var(--user-bubble);border-top-right-radius:4px;color:#fff;}
  .bubble strong{font-weight:600;}
  .bubble .tag{display:inline-block;background:rgba(100,50,0,.15);color:#2a1000;border:1px solid rgba(100,50,0,.3);border-radius:10px;font-size:11px;padding:2px 8px;margin:3px 3px 3px 0;font-weight:500;}

  /* QUICK REPLIES */
  .quick-replies{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .qr{background:transparent;border:1px solid rgba(50,20,0,.35);color:#2a1000;border-radius:20px;padding:5px 13px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;}
  .qr:hover{background:rgba(50,20,0,.1);border-color:#2a1000;}

  /* APPOINTMENT FORM */
  .appt-form{background:#e8a858;border:1px solid rgba(140,70,0,0.2);border-radius:14px;padding:16px;margin-top:6px;}
  .appt-form h4{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#1a0800;margin-bottom:12px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .form-field{display:flex;flex-direction:column;gap:4px;}
  .form-field.full{grid-column:span 2;}
  .form-field label{font-size:11px;color:#3a1800;font-weight:500;letter-spacing:.5px;text-transform:uppercase;}
  .form-field input,.form-field select{background:#f5c888;border:1px solid rgba(140,70,0,0.25);color:#1a0800;border-radius:8px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
  .form-field input:focus,.form-field select:focus{border-color:#2a7fd4;}
  .form-field select option{background:#f5c888;color:#1a0800;}
  .btn-confirm{margin-top:12px;width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
  .btn-confirm:hover{opacity:.85;}

  /* INPUT AREA */
  .input-area{padding:12px 16px 16px;border-top:1px solid rgba(140,70,0,0.18);}
  .input-row{display:flex;gap:10px;align-items:flex-end;background:#f0ba70;border:1px solid rgba(140,70,0,0.25);border-radius:16px;padding:8px 12px;transition:border .2s;}
  .input-row:focus-within{border-color:#2a7fd4;}
  #userInput{flex:1;background:transparent;border:none;color:#1a0800;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;max-height:100px;min-height:24px;line-height:1.5;}
  #userInput::placeholder{color:#7a4010;}
  .send-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;}
  .send-btn:hover{opacity:.8;}
  .send-btn svg{width:16px;height:16px;color:#fff;}

  /* TYPING */
  .typing-indicator{display:flex;gap:4px;padding:12px 16px;align-items:center;}
  .typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite;}
  .typing-indicator span:nth-child(2){animation-delay:.15s}
  .typing-indicator span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* CONFIRM CARD */
  .confirm-card{background:rgba(0,180,120,.08);border:1px solid rgba(0,180,120,.3);border-radius:14px;padding:14px 16px;margin-top:6px;}
  .confirm-card h4{color:#50ffb0;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:8px;}
  .confirm-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
  .confirm-row span:first-child{color:#5a3010;}
  .confirm-row span:last-child{font-weight:500;color:#1a0800;}

  @media(max-width:600px){
    .form-grid{grid-template-columns:1fr;}
    .form-field.full{grid-column:span 1;}
  }
</style>
</head>

const FIREBASE_URL = 'https://cda-turbo-barroblanco-default-rtdb.firebaseio.com';
// ===========================

<div style="background:#0d1420;border:1px solid rgba(0,200,255,0.2);border-radius:12px;padding:14px 16px;margin-top:4px;">
  <div style="font-size:13px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;">Dirección</div>

  </a>
</div>`,
  documentos: "Para tu cita solo necesitas traer la <strong>tarjeta de tránsito</strong>. Si tienes alguna duda adicional, ¡con gusto te ayudo!",
  asesor: `¡Claro! 😊 Te conecto con uno de nuestros <strong>asesores comerciales</strong> ahora mismo. Haz clic en el botón disponible:<br><br><a href="https://wa.me/573189460686?text=Hola,%20me%20comunic%C3%B3%20desde%20el%20chatbot%20TURBO%20del%20CDA%20Barroblanco%20y%20quisiera%20m%C3%A1s%20informaci%C3%B3n." target="_blank" style="display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;text-decoration:none;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;margin-top:6px;box-shadow:0 4px 14px rgba(37,211,102,0.4);">💬 Asesor 1 — WhatsApp</a><br><br><a href="https://wa.me/573189460685?text=Hola,%20me%20comunic%C3%B3%20desde%20el%20chatbot%20TURBO%20del%20CDA%20Barroblanco%20y%20quisiera%20m%C3%A1s%20informaci%C3%B3n." target="_blank" style="display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;text-decoration:none;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;margin-top:6px;box-shadow:0 4px 14px rgba(37,211,102,0.4);">💬 Asesor 2 — WhatsApp</a>`,

const FAQS = [
  { keys: ["horario","hora","atienden","abierto","cierra","cuando","jornada"], resp: "horario" },
  { keys: ["servicio","ofrece","hacen","realizan","tipos","moto 2t","moto 4t","motocarro","electrico","eléctrico","liviano"], resp: "servicios" },
  { keys: ["precio","costo","valor","cuanto","cobran","tarifa","tarifas","2026"], resp: "precio" },

  { keys: ["asesor","asesor comercial","humano","persona","hablar con","whatsapp","contacto","llamar","vendedor"], resp: "asesor" },
];

let awaitingAppointment = false;
let conversationHistory = [];

// ─── SISTEMA DE GESTIÓN DE CITAS (FIREBASE) ────────────────────────────────
let citasCache = {}; // cache local sincronizado con Firebase

async function sincronizarCitasFirebase() {
  try {
    const resp = await fetch(`${FIREBASE_URL}/citas.json`);
    const data = await resp.json();
    citasCache = data || {};
  } catch(e) {
    citasCache = {};
  }
}

function slotKey(fecha, hora) { return fecha + '_' + hora.replace(/[: ]/g, '-'); }

function isSlotOcupado(fecha, hora) {
  return !!citasCache[slotKey(fecha, hora)];
}

async function registrarCita(fecha, hora, datos) {
  const key = slotKey(fecha, hora);
  citasCache[key] = datos;
  try {
    await fetch(`${FIREBASE_URL}/citas/${key}.json`, {
      method: 'PUT',
      body: JSON.stringify({ ...datos, fecha, hora, reservado: true })
    });
  } catch(e) { console.error('Error guardando cita en Firebase', e); }
}

function getHorariosDelDia(fechaStr) {
  const d = new Date(fechaStr + 'T12:00:00');
  const dia = d.getDay();
  function slots(hIni, mIni, hFin, mFin) {
    const result = [];
    let h = hIni, m = mIni;
    while (h < hFin || (h === hFin && m <= mFin)) {
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      result.push(`${h12}:${m.toString().padStart(2,'0')} ${ampm}`);
      m += 20;
      if (m >= 60) { m -= 60; h++; }
    }
    return result;
  }
  if (dia === 0) return slots(8,0,11,40);
  if (dia === 6) return slots(7,0,16,10);
  return slots(7,0,18,10);
}

function getHorariosDisponibles(fechaStr) {
  return getHorariosDelDia(fechaStr).filter(h => !isSlotOcupado(fechaStr, h));
}

function buildHorariosOptions(fechaStr) {
  if (!fechaStr) return '<option value="">Selecciona primero la fecha...</option>';
  const todos = getHorariosDelDia(fechaStr);
  if (todos.length === 0) return '<option value="">⛔ No hay atención ese día</option>';
  return '<option value="">Selecciona hora...</option>' + todos.map(h => {
    const ocupado = isSlotOcupado(fechaStr, h);
    return `<option value="${h}" ${ocupado ? 'disabled style="color:#888"' : ''}>${h}${ocupado ? ' — No disponible ⛔' : ''}</option>`;
  }).join('');
}

function calcularPrecio(tipo, anio) {
  const currentYear = new Date().getFullYear();
  const antiguedad = currentYear - parseInt(anio);
  // Determinar rango: 0-2, 3-7, 8-17, 17+
  const rango = antiguedad <= 2 ? 0 : antiguedad <= 7 ? 1 : antiguedad <= 17 ? 2 : 3;
  const tarifas = {
    'Moto 2T':                        [246900, 247200, 247500, 247200],
    'Moto 4T':                        [246900, 247200, 247500, 247200],
    'Motocarro':                      [367500, 367800, 368100, 367800],
    'Liviano No Público (Particular)':[367500, 367800, 368100, 367800],
    'Liviano Público (Taxi/Colectivo)':[368100, 368400, 368800, 368400],
    'Liviano No Público Eléctrico':   [275801, 276108, 276508, 276108],
    'Liviano Público Eléctrico':      [275208, 275508, 275808, 275508],
    'Motocarro':                      [367500, 367800, 368100, 367800],
  };
  const precios = tarifas[tipo];
  if (!precios) return null;
  const valor = precios[rango];
  const rangoLabel = rango === 0 ? '0-2 años' : rango === 1 ? '3-7 años' : rango === 2 ? '8-17 años' : '17+ años';
  return { valor, rangoLabel, antiguedad };
}

function formatPrecio(v) {
  return '$' + v.toLocaleString('es-CO');
}

function consultarPrecio() {
  const tipo = document.getElementById('pc_tipo')?.value;
  const anio = document.getElementById('pc_anio')?.value;
  const resultado = document.getElementById('pc_resultado');
  const pendiente = document.getElementById('pc_pendiente');

    if (resultado) resultado.style.display = 'none';
    if (pendiente) pendiente.style.display = 'block';
    return;
  }
  const info = calcularPrecio(tipo, anio);
  if (!info) return;
  document.getElementById('pc_tipo_label').innerHTML = `<strong>${tipo}</strong> · Modelo ${anio}`;
  document.getElementById('pc_rango_label').textContent = `Antigüedad: ${info.rangoLabel} (${info.antiguedad} año${info.antiguedad !== 1 ? 's' : ''})`;
  document.getElementById('pc_valor_label').textContent = formatPrecio(info.valor);
  if (resultado) resultado.style.display = 'block';
  if (pendiente) pendiente.style.display = 'none';
}

async function confirmAppointment(){
  const n=document.getElementById('f_name')?.value.trim();
  const p=document.getElementById('f_phone')?.value.trim();
  const pl=document.getElementById('f_placa')?.value.trim();
  const t=document.getElementById('f_tipo')?.value;
  const anio=document.getElementById('f_anio')?.value.trim();
  const marca=document.getElementById('f_marca')?.value.trim();
  const combustible=document.getElementById('f_combustible')?.value;
  const d=document.getElementById('f_date')?.value;
  const h=document.getElementById('f_hora')?.value;
  if(!n||!p||!pl||!t||!anio||!marca||!combustible||!d||!h){
    addMessage("⚠️ Por favor completa <strong>todos los campos</strong> para confirmar tu cita.");
    return;
  }
  const fecha = new Date(d).toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const precioInfo = calcularPrecio(t, anio);

  // Resincronizar con Firebase justo antes de verificar — captura bloqueos del panel
  await sincronizarCitasFirebase();

  // Verificar si el horario ya está ocupado
  if (isSlotOcupado(d, h)) {
    const disponibles = getHorariosDisponibles(d);
    let msg = `⛔ ¡Ups! El horario de las <strong>${h}</strong> del <strong>${fecha}</strong> ya está reservado por otro cliente.`;
    if (disponibles.length > 0) {
      const tags = disponibles.map(s => `<span class='tag' style='cursor:pointer' onclick="seleccionarHorario('${s}')" title="Clic para seleccionar">🕐 ${s}</span>`).join(' ');
      msg += `<br><br>📅 <strong>Estos horarios siguen disponibles para esa fecha, haz clic en uno para seleccionarlo:</strong><br><br>${tags}`;
    } else {
      msg += `<br><br>😔 No quedan horarios disponibles para ese día. Por favor elige otra fecha en el formulario.`;
    }
    addMessage(msg, false);
    // Recargar el select manteniendo la fecha actual
    actualizarHorarios();
    return;
  }

  // Registrar la cita en Firebase
  await registrarCita(d, h, { nombre: n, telefono: p, placa: pl, tipo: t, anio, marca, combustible });

  // Enviar notificación al panel via Firebase
  const notif = {
    id: Date.now(),
    nombre: n,
    telefono: p,
    placa: pl.toUpperCase(),
    tipo: t,
    marca,
    combustible,
    anio,
    fecha,
    fechaISO: d, // ← formato YYYY-MM-DD para comparaciones exactas
    hora: h,
    timestamp: new Date().toLocaleTimeString('es-CO'),
    leida: false
  };
  // Guardar en Firebase: notificaciones (temporales) Y clientes (permanente)
  try {
    await fetch(`${FIREBASE_URL}/notificaciones/${notif.id}.json`, {
      method: 'PUT',
      body: JSON.stringify(notif)
    });
    // /clientes nunca se borra — base de datos permanente
    await fetch(`${FIREBASE_URL}/clientes/${notif.id}.json`, {
      method: 'PUT',
      body: JSON.stringify(notif)
    });
  } catch(e) {
    // Si falla Firebase, guardar local como respaldo
    const notifs = JSON.parse(localStorage.getItem('cda_notificaciones') || '[]');
    notifs.unshift(notif);
    localStorage.setItem('cda_notificaciones', JSON.stringify(notifs.slice(0, 50)));
  }

  const precioRow = precioInfo
    ? `<div class="confirm-row"><span>Año del modelo</span><span>${anio} (${precioInfo.rangoLabel})</span></div>
       <div class="confirm-row" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08)">
         <span style="color:var(--success);font-weight:600;">💰 Valor a pagar</span>
         <span style="color:var(--success);font-size:16px;font-weight:700;">${formatPrecio(precioInfo.valor)}</span>
       </div>`
    : '';

  const confirmCard = `<div class="confirm-card">
    <h4>✅ ¡Cita Confirmada!</h4>
    <div class="confirm-row"><span>Nombre</span><span>${n}</span></div>
    <div class="confirm-row"><span>Teléfono</span><span>${p}</span></div>
    <div class="confirm-row"><span>Placa</span><span>${pl.toUpperCase()}</span></div>
    <div class="confirm-row"><span>Vehículo</span><span>${t}</span></div>
    <div class="confirm-row"><span>Marca</span><span>${marca}</span></div>
    <div class="confirm-row"><span>Combustible</span><span>${combustible}</span></div>
    <div class="confirm-row"><span>Fecha</span><span>${fecha}</span></div>
    <div class="confirm-row"><span>Hora</span><span>${h}</span></div>
    ${precioRow}
  </div>`;

  const precioMensaje = precioInfo
    ? ` El valor de tu revisión para un <strong>${t}</strong> modelo <strong>${anio}</strong> es de <strong style="color:var(--success)">${formatPrecio(precioInfo.valor)}</strong> 💳`
    : '';

  const qr = buildQuickReplies(["¿Qué documentos llevar?","Calificar servicio","Otra pregunta"]);
  addMessage(`¡Tu cita ha sido agendada exitosamente, <strong>${n}</strong>! 🎉${precioMensaje}<br><br>Recuerda llegar 10 minutos antes con tu <strong>tarjeta de tránsito</strong>. ¡Te esperamos!`, false, confirmCard+qr);

  // Guardar ID de la cita actual para calificación posterior
  window._ultimaCitaId = notif.id;
  window._ultimaCitaNombre = n;
}

let _estrellasSeleccionadas = {};
const starLabels = ['','😞 Muy malo','😕 Malo','😐 Regular','😊 Bueno','🤩 ¡Excelente!'];

function hoverEstrellas(n, id) {
  for(let i=1;i<=5;i++){
    const s = document.getElementById(`star-${id}-${i}`);
    if(s){ s.style.filter = i<=n?'grayscale(0)':'grayscale(1)'; s.style.opacity = i<=n?'1':'.3'; s.style.transform = i<=n?'scale(1.15)':'scale(1)'; }
  }
  const lbl = document.getElementById(`starLabel-${id}`);
  if(lbl) lbl.textContent = starLabels[n];
}

function resetEstrellas(id) {
  const sel = _estrellasSeleccionadas[id] || 0;
  for(let i=1;i<=5;i++){
    const s = document.getElementById(`star-${id}-${i}`);
    if(s){ s.style.filter = i<=sel?'grayscale(0)':'grayscale(1)'; s.style.opacity = i<=sel?'1':'.4'; s.style.transform='scale(1)'; }
  }
  const lbl = document.getElementById(`starLabel-${id}`);
  if(lbl) lbl.textContent = sel ? starLabels[sel] : '';
}

function seleccionarEstrella(n, id, nombre) {
  _estrellasSeleccionadas[id] = n;
  resetEstrellas(id);
}

async function enviarCalificacion(citaId, nombre) {
  const puntos = _estrellasSeleccionadas[citaId] || 0;
  if (!puntos) { alert('Por favor selecciona al menos una estrella ⭐'); return; }
  const comentario = document.getElementById(`comentario-${citaId}`)?.value.trim() || '';
  const cal = {
    citaId, nombre, puntos, comentario,
    fecha: new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'}),
    ts: Date.now()
  };
  try {
    await fetch(`${FIREBASE_URL}/calificaciones/${citaId}.json`, { method:'PUT', body: JSON.stringify(cal) });
    await fetch(`${FIREBASE_URL}/clientes/${citaId}/calificacion.json`, { method:'PUT', body: JSON.stringify(puntos) });
    await fetch(`${FIREBASE_URL}/clientes/${citaId}/comentario.json`, { method:'PUT', body: `"${comentario.replace(/"/g,"'")}"` });
  } catch(e) { console.error('Error guardando calificación:', e); }
  const widget = document.getElementById(`starWidget-${citaId}`);
  if(widget) widget.innerHTML = `<div style="text-align:center;padding:14px;">
    <div style="font-size:36px;margin-bottom:8px;">${['','😞','😕','😐','😊','🤩'][puntos]}</div>
    <div style="font-weight:700;color:#ffcc00;font-size:15px;">¡Gracias por tu calificación!</div>
    <div style="font-size:13px;color:#7aaccc;margin-top:4px;">${'⭐'.repeat(puntos)} · ${starLabels[puntos]}</div>
    ${comentario ? `<div style="font-size:12px;color:#aac8e8;margin-top:8px;font-style:italic;">"${comentario}"</div>` : ''}
  </div>`;
  addMessage(`¡Gracias por calificarnos, <strong>${nombre}</strong>! Tu opinión con <strong>${puntos} estrella${puntos>1?'s':''}</strong> ha sido registrada. 🌟 ¡Nos vemos en la próxima visita!`, false, buildQuickReplies(["Agendar cita","Hablar con asesor"]));
}

function detectIntent(text){
  const t = text.toLowerCase();
  if(/\b(cita|agendar|reservar|apartar|programar)\b/.test(t)) return 'appointment';
  if(/\b(hola|buenos|buenas|saludos|hey)\b/.test(t)) return 'greeting';
  if(/\b(gracias|muchas gracias|thank)\b/.test(t)) return 'thanks';
  if(/\b(adios|hasta|chao|bye)\b/.test(t)) return 'bye';
  if(/\b(asesor|humano|persona|whatsapp|contacto|vendedor|hablar con)\b/.test(t)) return 'asesor';
  if(/\b(calificar|calificacion|puntaje|estrella|resena|opinion|valorar)\b/.test(t)) return 'calificar';
  if(/\b(soat|seguro obligatorio|cotizar soat|precio soat|cuanto cuesta soat|valor soat)\b/.test(t)) return 'soat';
  for(const faq of FAQS){
    if(faq.keys.some(k=>t.includes(k))) return faq.resp;
  }
  return 'ai';
}

Tu nombre es TURBO. No uses asteriscos para negritas, responde en texto plano con máximo 3 oraciones.`,

function actualizarSubcatSOAT() {
  const cat = document.getElementById('soat_categoria')?.value;
  const sel = document.getElementById('soat_subcat');
  const res = document.getElementById('soat_resultado');
  const pend = document.getElementById('soat_pendiente');
  if (res) res.style.display = 'none';
  if (pend) { pend.style.display = 'block'; pend.textContent = 'Selecciona la clase de vehículo para ver el precio 👆'; }
  if (!cat || !SOAT_DATA[cat]) { sel.innerHTML = '<option value="">Selecciona primero la categoría...</option>'; return; }
  sel.innerHTML = '<option value="">Selecciona clase...</option>' +
    SOAT_DATA[cat].map((item, i) => `<option value="${cat}_${i}">${item.label}</option>`).join('');
}

function calcularSOAT() {
  const val = document.getElementById('soat_subcat')?.value;
  const res = document.getElementById('soat_resultado');
  const pend = document.getElementById('soat_pendiente');
  if (!val) { if(res) res.style.display='none'; return; }
  const [cat, idx] = val.split('_');
  const item = SOAT_DATA[cat]?.[parseInt(idx)];
  if (!item) return;
  const fmt = n => '$' + n.toLocaleString('es-CO');
  document.getElementById('soat_clase_label').textContent = item.label;
  document.getElementById('soat_desglose').innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">Prima neta</span><span>${fmt(item.prima)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">Contribución ADRES</span><span>${fmt(item.contrib)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">Tasa RUNT</span><span>${fmt(item.runt)}</span></div>`;
  document.getElementById('soat_total').textContent = fmt(item.total);
  if (res) res.style.display = 'block';
  if (pend) pend.style.display = 'none';
}

async function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage(text, true);
  showTyping();

  await new Promise(r=>setTimeout(r,600+Math.random()*600));
  hideTyping();

  const intent = detectIntent(text);

  if(intent === 'greeting'){
    addMessage(`¡Hola! 👋 Soy <strong>TURBO</strong>, tu asistente virtual del <strong>CDA Barroblanco</strong>. Estoy aquí para ayudarte las 24 horas del día. ¿En qué puedo asistirte hoy?`,
      false, buildQuickReplies(["Agendar cita","Ver servicios","Precios 2026","Horarios","Ubicación","Hablar con asesor"]));
  } else if(intent === 'appointment'){
    addMessage("¡Perfecto! Voy a ayudarte a agendar tu cita de revisión técnico-mecánica. Por favor completa el siguiente formulario 👇", false, buildAppointmentForm());
  } else if(intent === 'asesor'){
    addMessage(KNOWLEDGE.asesor, false, buildQuickReplies(["Agendar cita","Ver servicios","Precios 2026"]));
  } else if(intent === 'soat'){
    addMessage('🛡️ ¡Con gusto! Aquí tienes el cotizador oficial del SOAT 2026. Selecciona la categoría y clase de tu vehículo para ver el precio exacto con todo el desglose:', false, buildSoatWidget() + buildQuickReplies(["Agendar cita","Precios revisión","Hablar con asesor"]));
  } else if(intent === 'calificar'){
    const cid = window._ultimaCitaId || 'general';
    const cnombre = window._ultimaCitaNombre || 'cliente';
    addMessage('¡Nos encantaría saber cómo fue tu experiencia! 🌟 Tómate un momento para calificarnos:', false, buildStarWidget(cid, cnombre));
  } else if(intent === 'thanks'){
    addMessage("¡Con gusto! 😊 Es un placer ayudarte. Si necesitas algo más, aquí estaré.", false,
      buildQuickReplies(["Agendar cita","Hablar con asesor","Precios 2026"]));
  } else if(intent === 'bye'){
    addMessage("¡Hasta pronto! 👋 Recuerda que estoy disponible 24/7. ¡Que tengas un excelente día en el CDA Barroblanco! 🚗✅");
  } else if(KNOWLEDGE[intent]){
    const qrs = {
      horario: ["Agendar cita","Ver servicios","Precios 2026","Hablar con asesor"],
      servicios: ["Agendar cita","Precios 2026","Hablar con asesor"],
      precio: ["Agendar cita","¿Qué documentos llevar?","Hablar con asesor"],
      requisitos: ["Agendar cita","Precios 2026","Hablar con asesor"],
      ubicacion: ["Agendar cita","Ver horarios","Hablar con asesor"],
      duracion: ["Agendar cita","Precios 2026","Hablar con asesor"],
    };
    if (intent === 'precio') {
      addMessage(KNOWLEDGE[intent], false, buildPriceWidget() + buildQuickReplies(qrs.precio));
    } else {
      addMessage(KNOWLEDGE[intent], false, buildQuickReplies(qrs[intent]||["Agendar cita","Hablar con asesor"]));
    }
  } else {
    const aiResp = await getAIResponse(text);
    addMessage(aiResp, false, buildQuickReplies(["Agendar cita","Ver servicios","Precios 2026","Hablar con asesor"]));
  }
}
